name: orbit

services:
  orbit-web:
    container_name: orbit-web
    image: ghcr.io/capsoftware/orbit-web:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://orbit:${MYSQL_PASSWORD:-changeme}@mysql:3306/orbit
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${WEB_URL:-http://localhost:3000}
      DATABASE_ENCRYPTION_KEY: ${DATABASE_ENCRYPTION_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ORBIT_AWS_ACCESS_KEY: ${MINIO_ROOT_USER:-capadmin}
      ORBIT_AWS_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme123}
      ORBIT_AWS_BUCKET: ${S3_BUCKET:-orbit}
      ORBIT_AWS_REGION: us-east-1
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_PATH_STYLE: "true"
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_DOMAIN: ${RESEND_FROM_DOMAIN:-}
      MEDIA_SERVER_URL: http://media-server:3456
      MEDIA_SERVER_WEBHOOK_SECRET: ${MEDIA_SERVER_WEBHOOK_SECRET}
      MEDIA_SERVER_WEBHOOK_URL: http://orbit-web:3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - orbit-network

  media-server:
    container_name: orbit-media-server
    image: ghcr.io/capsoftware/orbit-media-server:latest
    restart: unless-stopped
    environment:
      PORT: 3456
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3456/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - orbit-network

  mysql:
    container_name: orbit-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: orbit
      MYSQL_USER: orbit
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootchangeme}
    command:
      - --max_connections=1000
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - orbit-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "orbit", "-p${MYSQL_PASSWORD:-changeme}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - orbit-network

  minio:
    container_name: orbit-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-capadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
    volumes:
      - orbit-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - orbit-network

  minio-setup:
    container_name: orbit-minio-setup
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set capminio http://minio:9000 $${MINIO_ROOT_USER:-capadmin} $${MINIO_ROOT_PASSWORD:-changeme123};
      mc mb capminio/$${S3_BUCKET:-orbit} --ignore-existing;
      mc anonymous set download capminio/$${S3_BUCKET:-orbit};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-capadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme123}
      S3_BUCKET: ${S3_BUCKET:-orbit}
    networks:
      - orbit-network

volumes:
  orbit-mysql-data:
  orbit-minio-data:

networks:
  orbit-network:
    driver: bridge
